name: Keep Alive Supabase - Loomine Shelf

on:
  schedule:
    - cron: '0 12 * * *' # Roda todo dia ao meio-dia (UTC)
  workflow_dispatch:      # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping_supabase
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
        run: |
          curl -i -X GET "${{ env.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ env.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ env.SUPABASE_ANON_KEY }}"
